<!DOCTYPE html>
<html>
<head>
    <title>Basic Server Test</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        button { padding: 10px; margin: 5px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        #response { margin-top: 20px; padding: 15px; border: 1px solid #ccc; background: #f9f9f9; min-height: 50px; }
    </style>
</head>
<body>
    <h1>Basic Express Server Test</h1>
    <button onclick="fetchData('/')">Get Home</button>
    <button onclick="fetchData('/status')">Get Status</button>
    <button onclick="fetchData('/info')">Get Info</button>

    <h3>Response from Server:</h3>
    <div id="response">Click a button to see response...</div>

    <script>
        function fetchData(route) {
            const resultDiv = document.getElementById('response');
            resultDiv.innerText = "Loading...";
            
            fetch(route)
                .then(res => res.text())
                .then(data => {
                    resultDiv.innerText = data;
                })
                .catch(err => {
                    resultDiv.innerText = "Error: Server not running?";
                });
        }
    </script>
</body>
</html>
