<!DOCTYPE html>
<html>
<head>
  <title>Profile Card</title>
  <style>
    body {
      background-color: #f4f4f4;
      font-family: Arial, sans-serif;
    }
    .card {
      width: 300px;
      background-color: white;
      margin: 50px auto;
      padding: 20px;
      border: 1px solid #ccc;
      box-shadow: 3px 3px 10px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .profile-pic {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background-color: #ddd;
    }
    .bio {
      text-align: center;
      margin-bottom: 20px;
    }
    .skills-box {
      width: 100%;
      margin-bottom: 20px;
    }
    .skill-name {
      margin-top: 10px;
      margin-bottom: 5px;
      font-size: 14px;
    }
    .progress-bar {
      width: 100%;
      height: 12px;
      background-color: #eee;
      border-radius: 5px;
    }
    .progress {
      height: 100%;
      background-color: #4CAF50;
      border-radius: 5px;
    }
    .buttons {
      display: flex;
      gap: 10px;
    }
    .btn {
      padding: 8px 15px;
      border: none;
      cursor: pointer;
      background-color: #008CBA;
      color: white;
      border-radius: 3px;
    }
    .btn:hover {
      background-color: #005f7a;
    }
  </style>
</head>
<body>

<div class="card">
  <img src="https://via.placeholder.com/100" alt="Profile" class="profile-pic">
  <h2>John Doe</h2>
  <div class="bio">
    <p>Hi! I am a web development student learning HTML and CSS basics.</p>
  </div>
  
  <div class="skills-box">
    <div class="skill-name">HTML</div>
    <div class="progress-bar"><div class="progress" style="width: 80%;"></div></div>
    
    <div class="skill-name">CSS</div>
    <div class="progress-bar"><div class="progress" style="width: 60%;"></div></div>
    
    <div class="skill-name">JavaScript</div>
    <div class="progress-bar"><div class="progress" style="width: 30%;"></div></div>
  </div>

  <div class="buttons">
    <button class="btn">Follow</button>
    <button class="btn">Message</button>
  </div>
</div>

</body>
</html>
