<!DOCTYPE html>
<html>
<head>
  <title>Nav Bar</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
    }
    .nav {
      background-color: #333;
      overflow: hidden;
    }
    .nav a {
      float: left;
      display: block;
      color: white;
      text-align: center;
      padding: 14px 20px;
      text-decoration: none;
    }
    .nav a:hover {
      background-color: #ddd;
      color: black;
    }
    .nav a.active {
      background-color: #4CAF50;
      color: white;
    }
    .menu-icon {
      display: none;
      color: white;
      padding: 14px 20px;
      font-size: 18px;
      cursor: pointer;
      float: right;
    }
    #menu-toggle {
      display: none;
    }
    
    /* Mobile responsive code */
    @media screen and (max-width: 600px) {
      .nav a {
        display: none;
        float: none;
        width: 100%;
        box-sizing: border-box;
        text-align: left;
      }
      .menu-icon {
        display: block;
      }
      /* Show links when checkbox is checked */
      #menu-toggle:checked ~ a {
        display: block;
      }
    }
  </style>
</head>
<body>

<div class="nav">
  <input type="checkbox" id="menu-toggle">
  <label for="menu-toggle" class="menu-icon">&#9776; Menu</label>
  
  <a href="#" class="active">Home</a>
  <a href="#">About Us</a>
  <a href="#">Services</a>
  <a href="#">Gallery</a>
  <a href="#">Contact</a>
</div>

<div style="padding: 20px;">
  <h2>Welcome to my website</h2>
  <p>Resize the browser window to less than 600px to see the hamburger menu effect.</p>
</div>

</body>
</html>
