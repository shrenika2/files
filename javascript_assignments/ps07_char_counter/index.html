<!DOCTYPE html>
<html>
<head>
  <title>Character Counter</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    textarea { width: 300px; height: 100px; font-size: 14px; padding: 5px; }
    .info { margin-top: 10px; font-size: 16px; border: 1px solid #ccc; width: 300px; padding: 10px; background-color: #f9f9f9; }
    .red-text { color: red; font-weight: bold; }
    button { padding: 5px 10px; cursor: pointer; }
  </style>
</head>
<body>

<h2>Word and Character Counter</h2>
<textarea id="myText" onkeyup="countText()" placeholder="Type something here..."></textarea>
<br><br>
<button onclick="clearText()">Clear Text</button>

<div class="info">
  Characters: <span id="charCount">0</span><br>
  Words: <span id="wordCount">0</span><br>
  Remaining Limit: <span id="remaining">200</span>
</div>

<script>
  function countText() {
    var text = document.getElementById("myText").value;
    
    // Enforce 200 character limit
    if (text.length > 200) {
      text = text.substring(0, 200);
      document.getElementById("myText").value = text;
    }

    var charCount = text.length;
    var remaining = 200 - charCount;
    
    // Count words using split by space
    var words = 0;
    if (charCount > 0) {
      var splitWords = text.trim().split(" ");
      for(var i=0; i<splitWords.length; i++) {
        if(splitWords[i] !== "") {
          words++;
        }
      }
    }

    document.getElementById("charCount").innerHTML = charCount;
    document.getElementById("wordCount").innerHTML = words;
    document.getElementById("remaining").innerHTML = remaining;

    // Change color to red if 20 or less characters remaining
    if (remaining <= 20) {
      document.getElementById("remaining").className = "red-text";
    } else {
      document.getElementById("remaining").className = "";
    }
  }

  function clearText() {
    document.getElementById("myText").value = "";
    countText(); // update counters after clearing
  }
</script>

</body>
</html>
