<!DOCTYPE html>
<html>
<head>
  <title>Simple Calculator</title>
  <style>
    body { font-family: Arial; }
    .calc { border: 1px solid #333; width: 220px; padding: 10px; background: #ddd; margin: 50px auto; border-radius: 5px; }
    #screen { width: 100%; height: 40px; font-size: 20px; text-align: right; margin-bottom: 10px; box-sizing: border-box; padding: 5px; }
    button { width: 45px; height: 45px; font-size: 18px; margin: 2px; cursor: pointer; }
    .row { display: flex; justify-content: space-between; }
  </style>
</head>
<body>

<div class="calc">
  <input type="text" id="screen" readonly>
  
  <div class="row">
    <button onclick="addVal('7')">7</button>
    <button onclick="addVal('8')">8</button>
    <button onclick="addVal('9')">9</button>
    <button onclick="addVal('/')">/</button>
  </div>
  <div class="row">
    <button onclick="addVal('4')">4</button>
    <button onclick="addVal('5')">5</button>
    <button onclick="addVal('6')">6</button>
    <button onclick="addVal('*')">*</button>
  </div>
  <div class="row">
    <button onclick="addVal('1')">1</button>
    <button onclick="addVal('2')">2</button>
    <button onclick="addVal('3')">3</button>
    <button onclick="addVal('-')">-</button>
  </div>
  <div class="row">
    <button onclick="clearScreen()">C</button>
    <button onclick="addVal('0')">0</button>
    <button onclick="addVal('.')">.</button>
    <button onclick="addVal('+')">+</button>
  </div>
  <div class="row">
    <button onclick="calculate()" style="width: 100%; margin-top: 5px; background-color: #4CAF50; color: white;">=</button>
  </div>
</div>

<script>
  function addVal(val) {
    document.getElementById("screen").value += val;
  }

  function clearScreen() {
    document.getElementById("screen").value = "";
  }

  function calculate() {
    var exp = document.getElementById("screen").value;
    
    try {
      var result = eval(exp);
      
      // Handle division by zero
      if (result === Infinity || result === -Infinity) {
        document.getElementById("screen").value = "Cannot divide by zero";
      } else if (isNaN(result)) {
        document.getElementById("screen").value = "Error";
      } else {
        document.getElementById("screen").value = result;
      }
    } catch(err) {
      document.getElementById("screen").value = "Invalid Input";
    }
  }
</script>

</body>
</html>
