<!DOCTYPE html>
<html>
<head>
  <title>Todo List</title>
  <style>
    body { font-family: Arial; padding: 20px; background-color: #f4f4f4;}
    .container { background: white; padding: 20px; width: 400px; border: 1px solid #ccc; }
    ul { list-style-type: none; padding: 0; }
    li { margin: 5px 0; padding: 10px; background: #eee; border: 1px solid #ddd; }
    .done-text { text-decoration: line-through; color: gray; }
    button { cursor: pointer; padding: 5px; margin-left: 5px; }
    .filters { margin-top: 15px; margin-bottom: 15px; }
  </style>
</head>
<body>

<div class="container">
  <h2>My Todo List</h2>
  <input type="text" id="taskInput" placeholder="Enter a new task...">
  <button onclick="addTask()">Add Task</button>

  <div class="filters">
    <button onclick="showAll()">All</button>
    <button onclick="showActive()">Active</button>
    <button onclick="showCompleted()">Completed</button>
  </div>

  <ul id="taskList"></ul>
</div>

<script>
  var tasks = [];

  function loadTasks() {
    var storedTasks = localStorage.getItem("my_tasks");
    if (storedTasks) {
      tasks = JSON.parse(storedTasks);
    }
    renderTasks("all");
  }

  function saveTasks() {
    localStorage.setItem("my_tasks", JSON.stringify(tasks));
  }

  function addTask() {
    var input = document.getElementById("taskInput").value;
    if (input === "") {
      alert("Please enter a task name");
      return;
    }
    
    var newTask = { name: input, isDone: false };
    tasks.push(newTask);
    document.getElementById("taskInput").value = "";
    
    saveTasks();
    renderTasks("all");
  }

  function toggleTask(index) {
    tasks[index].isDone = !tasks[index].isDone;
    saveTasks();
    renderTasks("all");
  }

  function deleteTask(index) {
    tasks.splice(index, 1);
    saveTasks();
    renderTasks("all");
  }

  function renderTasks(filter) {
    var list = document.getElementById("taskList");
    list.innerHTML = ""; // clear list

    for (var i = 0; i < tasks.length; i++) {
      var task = tasks[i];

      // apply simple filter
      if (filter === "active" && task.isDone === true) {
        continue;
      }
      if (filter === "completed" && task.isDone === false) {
        continue;
      }

      var liHtml = "";
      if (task.isDone) {
        liHtml += "<span class='done-text'>" + task.name + "</span>";
      } else {
        liHtml += "<span>" + task.name + "</span>";
      }

      liHtml += " <button onclick='toggleTask(" + i + ")'>Done/Undo</button>";
      liHtml += " <button onclick='deleteTask(" + i + ")'>Delete</button>";

      var newLi = document.createElement("li");
      newLi.innerHTML = liHtml;
      list.appendChild(newLi);
    }
  }

  function showAll() { renderTasks("all"); }
  function showActive() { renderTasks("active"); }
  function showCompleted() { renderTasks("completed"); }

  // Load from local storage when page starts
  loadTasks();
</script>

</body>
</html>
